plugins {
    id 'java'
    id 'idea'
    id 'eclipse'
    id 'maven-publish'
    id 'net.minecraftforge.gradle' version '[7.0.11,8.0)'
    id 'net.minecraftforge.jarjar' version '0.2.3'
}

version = project.mod_version
group = "com.yourname.modid" // http://maven.apache.org/guides/mini/guide-naming-conventions.html
base.archivesName = 'CustomPlayerModelsLexForge-26.1'

def mod_id = "cpm"

java.toolchain.languageVersion = JavaLanguageVersion.of(25)

println('Java: ' + System.getProperty('java.version') + ' JVM: ' + System.getProperty('java.vm.version') + '(' + System.getProperty('java.vendor') + ') Arch: ' + System.getProperty('os.arch'))
minecraft {
	accessTransformer = true
    // Default run configurations.
    // These can be tweaked, removed, or duplicated as needed.
    runs {
    	configureEach {
    		args "-mixin.config=cpm.mixins.json"
    		args "-mixin.config=cpm.mixins.compat.json"
    		args "-mixin.config=cpm.mixins.shared.json"
    		systemProperty "mixin.debug.verbose", "true"
			systemProperty "mixin.debug.export", "true"
    	}
        
		register('client') {
            systemProperty 'forge.enabledGameTestNamespaces', mod_id
        }

        register('server') {
            systemProperty 'forge.enabledGameTestNamespaces', mod_id
            args '--nogui'
        }

        register('gameTestServer') {
            systemProperty 'forge.enabledGameTestNamespaces', mod_id
        }

        register('data') {
            workingDir = layout.projectDirectory.dir('run-data')

            args '--mod', mod_id, '--all', '--output', layout.projectDirectory.dir('src/generated/resources'), '--existing', layout.projectDirectory.dir('src/main/resources')
        }
    }
}

// Include resources generated by data generators.
sourceSets.main.resources { srcDir 'src/generated/resources' }

jarJar.register() {
    archiveClassifier = null
}

repositories {
	minecraft.mavenizer(it)
    maven fg.forgeMaven
    maven fg.minecraftLibsMaven
    exclusiveContent {
        forRepository {
            maven {
                name = 'Sponge'
                url = 'https://repo.spongepowered.org/repository/maven-public'
            }
        }
        filter {
            includeGroupAndSubgroups('org.spongepowered')
        }
    }
    mavenCentral()
    mavenLocal()
    // Put repositories for dependencies here
    // ForgeGradle automatically adds the Forge maven and Maven Central for you

    // If you have mod jar dependencies in ./libs, you can declare them as a repository like so:
    // flatDir {
    //     dir 'libs'
    // }
    maven {
        url 'https://www.cursemaven.com'
        content {
            includeGroup "curse.maven"
        }
    }
    exclusiveContent {
        forRepository {
            maven {
                name = "Modrinth"
                url = "https://api.modrinth.com/maven"
            }
        }
        filter {
            includeGroup "maven.modrinth"
        }
    }
}

dependencies {
    // Specify the version of Minecraft to use. If this is any group other than 'net.minecraft', it is assumed
    // that the dep is a ForgeGradle 'patcher' dependency, and its patches will be applied.
    // The userdev artifact is a special name and will get all sorts of transformations applied to it.
    implementation minecraft.dependency("net.minecraftforge:forge:26.1-62.0.3")
    
    //annotationProcessor 'net.minecraftforge:eventbus-validator:7.0.1'
    
    //compileOnly("io.github.llamalad7:mixinextras-common:0.4.1")
    
    // Real mod deobf dependency examples - these get remapped to your current mappings
    // compileOnly fg.deobf("mezz.jei:jei-${mc_version}:${jei_version}:api") // Adds JEI API as a compile dependency
    // runtimeOnly fg.deobf("mezz.jei:jei-${mc_version}:${jei_version}") // Adds the full JEI mod as a runtime dependency
    // implementation fg.deobf("com.tterrag.registrate:Registrate:MC${mc_version}-${registrate_version}") // Adds registrate as a dependency

    // Examples using mod jars from ./libs
    // implementation fg.deobf("blank:coolmod-${mc_version}:${coolmod_version}")

    // For more info...
    // http://www.gradle.org/docs/current/userguide/artifact_dependencies_tutorial.html
    // http://www.gradle.org/docs/current/userguide/dependency_management.html
    compileOnly files("../CustomPlayerModels-26.1/stubs/of.jar")
	compileOnly files("../CustomPlayerModels-26.1/stubs/iris.jar")
	compileOnly files("../CustomPlayerModels-26.1/stubs/fpm.jar")
	compileOnly files("../CustomPlayerModels-26.1/stubs/vc.jar")
    
    /*implementation(jarJar("io.github.llamalad7:mixinextras-forge:0.4.1")) {
        jarJar.ranged(it, "[0.4.1,)")
    }*/
}

sourceSets {
	main {
		java {
			srcDir "../CustomPlayerModels/src/shared/java"
			srcDir "../CustomPlayerModels-26.1/src/platform-shared/java"
			exclude "com/tom/cpm/common/PehkuiInterface.java"
		}
		resources {
			srcDir "../CustomPlayerModels/src/shared/resources"
			srcDir "../CustomPlayerModels-26.1/src/platform-shared/resources"
			exclude "**/*.lang"
		}
	}
}

jar {
    manifest {
        attributes([
				"Specification-Title"     : project.name,
                "Specification-Vendor"    : "tom5454",
                "Specification-Version"   : "1", // We are version 1 of ourselves
                "Implementation-Title"    : project.name,
                "Implementation-Version"  : project.jar.archiveVersion,
                "Implementation-Vendor"   : "tom5454",
                "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ"),
                "MixinConfigs": "cpm.mixins.json,cpm.mixins.shared.json,cpm.mixins.compat.json"
        ])
    }
    archiveClassifier = "lite"
    finalizedBy "jarJar"
}

tasks.named('jarJar') {
    archiveClassifier = ""
}

java {
    withSourcesJar()
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            artifact jar
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/mcmodsrepo"
        }
    }
}

eclipse {
    classpath { downloadJavadoc = downloadSources = true }
}
