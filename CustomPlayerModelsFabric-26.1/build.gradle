plugins {
	id 'net.fabricmc.fabric-loom' version "${loom_version}"
	id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

println('Java: ' + System.getProperty('java.version') + ' JVM: ' + System.getProperty('java.vm.version') + '(' + System.getProperty('java.vendor') + ') Arch: ' + System.getProperty('os.arch'))

repositories {
	maven { url 'https://jitpack.io' }
	maven { url "https://maven.terraformersmc.com/releases/"}
	maven {
        url 'https://www.cursemaven.com'
        content {
            includeGroup "curse.maven"
        }
    }
    exclusiveContent {
        forRepository {
            maven {
                name = "Modrinth"
                url = "https://api.modrinth.com/maven"
            }
        }
        filter {
            includeGroup "maven.modrinth"
        }
    }
}

def useLib = System.getProperty("useLib")

dependencies {
	// To change the versions see the gradle.properties file
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	implementation "net.fabricmc:fabric-loader:${project.loader_version}"

	// Fabric API. This is technically optional, but you probably want it anyway.
	//modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
	compileOnly("net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}")
	localRuntime("net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}")
	
	/*modImplementation("com.terraformersmc:modmenu:16.0.0-rc.1") {
        exclude(group: "net.fabricmc.fabric-api")
    }*/
	
	compileOnly files("../CustomPlayerModels-26.1/stubs/of.jar")
	
	/*modCompileOnly('maven.modrinth:sodium:mc1.21.10-0.7.2-fabric')
	modCompileOnly('maven.modrinth:iris:1.9.6+1.21.10-fabric')
    modImplementation("org.antlr:antlr4-runtime:4.13.1")
    modImplementation("io.github.douira:glsl-transformer:3.0.0-pre3")
    modImplementation("org.anarres:jcpp:1.4.14")*/
    
    /*modCompileOnly('maven.modrinth:vivecraft:26.1-1.3.5-fabric')
    implementation "com.electronwill.night-config:core:3.6.6"
    implementation "com.electronwill.night-config:toml:3.6.6"
    implementation("org.lwjgl:lwjgl-openvr:3.3.3")
    implementation("org.lwjgl:lwjgl-openvr:3.3.3:natives-linux")
    implementation("org.lwjgl:lwjgl-openvr:3.3.3:natives-macos")
    implementation("org.lwjgl:lwjgl-openvr:3.3.3:natives-windows")
    implementation("com.illposed.osc:javaosc-core:0.9")*/
	
	compileOnly files("../CustomPlayerModels-26.1/stubs/iris.jar")
	compileOnly files("../CustomPlayerModels-26.1/stubs/vc.jar")
	compileOnly files("../CustomPlayerModels-26.1/stubs/fpm.jar")
}

loom {
	accessWidenerPath = file("src/main/resources/cpm.accesswidener")
}

eclipse {
    // Run when importing the project
    synchronizationTasks 'genSources', 'genEclipseRuns'
}

sourceSets {
	main {
		java {
			srcDir "../CustomPlayerModels/src/shared/java"
			srcDir "../CustomPlayerModels-26.1/src/platform-shared/java"
			srcDir "src/rawmc-shared/java"
			exclude "com/tom/cpm/ModMenu.java"
		}
		resources {
			srcDir "../CustomPlayerModels/src/shared/resources"
			srcDir "../CustomPlayerModels-26.1/src/platform-shared/resources"
			srcDir "src/rawmc-shared/resources"
			exclude "**/*.lang"
		}
	}
}


processResources {
	inputs.property "version", project.version

	filesMatching("fabric.mod.json") {
		expand "version": project.version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 25
}

java {
	// Loom will automatically attach sourcesJar to a RemapSourcesJar task and to the "build" task
	// if it is present.
	// If you remove this line, sources will not be generated.
	withSourcesJar()
	
	sourceCompatibility = JavaVersion.VERSION_25
	targetCompatibility = JavaVersion.VERSION_25
}

jar {
	from("LICENSE") {
		rename { "${it}_${project.archivesBaseName}"}
	}
}

// configure the maven publication
publishing {
	publications {
		mavenJava(MavenPublication) {
			// add all the jars that should be included when publishing to maven
			artifact(jar) {
				builtBy jar
			}
			artifact(sourcesJar) {
				builtBy sourcesJar
			}
		}
	}

	// select the repositories you want to publish to
	repositories {
		// uncomment to publish to the local maven
		// mavenLocal()
	}
}
